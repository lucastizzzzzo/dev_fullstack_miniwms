version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms_password
      POSTGRES_DB: miniwms
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/miniwms
      SPRING_DATASOURCE_USERNAME: wms
      SPRING_DATASOURCE_PASSWORD: wms_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  db_data:
