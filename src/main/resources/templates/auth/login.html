<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Login - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>.center{max-width:420px;margin:60px auto}</style>
</head>
<body>
  <div class="container center">
    <h1>MINI WMS</h1>
    <h2>Login</h2>
    <div th:if="${param.error}" class="alert alert-danger">Usuário inexistente ou senha inválida</div>
    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div><input name="username" placeholder="Username"/></div>
      <div><input type="password" name="password" placeholder="Password"/></div>
      <div style="margin-top:10px"><button type="submit" class="btn">Sign in</button></div>
    </form>
    <div style="margin-top:12px">Ainda não tem conta? <a th:href="@{/register}">Cadastre-se</a></div>
  </div>
</body>
</html>
