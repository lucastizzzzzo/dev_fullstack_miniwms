<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Cadastro - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>.center{max-width:520px;margin:40px auto}</style>
</head>
<body>
  <div class="container center">
    <h1>Cadastro de Usuário</h1>
    <form th:action="@{/register}" th:object="${usuario}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div>
        <label>Nome</label>
        <input th:field="*{nome}" />
      </div>
      <div>
        <label>Email</label>
        <input th:field="*{email}" />
      </div>
      <div>
        <label>Senha</label>
        <input type="password" th:field="*{senhaHash}" />
      </div>
      <div>
        <label>Perfil</label>
        <select th:field="*{perfil}">
          <option value="OPERADOR">Operador</option>
          <option value="ADMINISTRADOR">Administrador</option>
        </select>
      </div>
      <div style="margin-top:10px"><button type="submit" class="btn">Criar conta</button></div>
    </form>
    <div style="margin-top:12px"><a th:href="@{/login}">Voltar ao login</a></div>
  </div>
</body>
</html>
