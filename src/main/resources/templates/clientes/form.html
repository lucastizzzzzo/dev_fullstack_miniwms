<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Cliente - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1 th:text="${cliente.id} == null ? 'Novo Cliente' : 'Editar Cliente'">Cliente</h1>
    <form th:action="@{${cliente.id} == null ? '/clientes' : '/clientes/' + ${cliente.id}}" th:object="${cliente}" method="post">
      <div><label>Nome</label><input th:field="*{nome}" /></div>
      <div><label>Documento</label><input th:field="*{documento}" /></div>
      <div><label>Telefone</label><input th:field="*{telefone}" /></div>
      <div><label>Email</label><input th:field="*{email}" /></div>
      <div><button type="submit" class="btn">Salvar</button></div>
    </form>
  </div>
</body>
</html>
