<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Novo Endereço - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1>Novo Endereço</h1>
    <form th:action="@{/enderecos}" th:object="${endereco}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div><label>Código</label><input th:field="*{codigo}" required /></div>
      <div><label>Descrição</label><input th:field="*{descricao}" /></div>
      <div><label>Tipo</label><input th:field="*{tipo}" /></div>
      <div><label>Capacidade</label><input type="number" th:field="*{capacidade}" /></div>
      <div style="margin-top:10px"><button class="btn" type="submit">Salvar</button> <a href="/enderecos">Cancelar</a></div>
    </form>
  </div>
</body>
</html>
