<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Endereços - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1>Endereços</h1>
    <div class="toolbar"><a href="/enderecos/novo" class="btn">Novo Endereço</a></div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table">
      <thead><tr><th>Código</th><th>Descrição</th><th>Tipo</th><th>Capacidade</th><th>Ações</th></tr></thead>
      <tbody>
        <tr th:each="e : ${enderecos}">
          <td th:text="${e.codigo}">A-01-01</td>
          <td th:text="${e.descricao}">Desc</td>
          <td th:text="${e.tipo}">PRATELEIRA</td>
          <td th:text="${e.capacidade}">100</td>
          <td>
            <form th:if="${e.ativo} and ${isAdmin}" th:action="@{'/enderecos/' + ${e.id} + '/desativar'}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn" type="submit">Desativar</button>
            </form>
            <span th:if="${!e.ativo}"> (desativado)</span>
            <form th:if="${!e.ativo} and ${isAdmin}" th:action="@{'/enderecos/' + ${e.id} + '/deletar'}" method="post" style="display:inline;margin-left:8px">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-danger" type="submit" onclick="return confirm('Deletar este endereço permanentemente?');">Deletar</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
