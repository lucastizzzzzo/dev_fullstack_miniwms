<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lote - Detalhe</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">
    <h1>Detalhe do Lote</h1>

    <div>
        <p><strong>Código:</strong> <span th:text="${lote.codigoLote}">L-000</span></p>
        <p><strong>Produto:</strong> <span th:text="${lote.produto != null ? lote.produto.nome : '-'}">-</span></p>
        <p><strong>Quantidade total:</strong> <span th:text="${lote.quantidadeTotal}">0</span></p>
        <p><strong>Quantidade reservada:</strong> <span th:text="${lote.quantidadeReservada}">0</span></p>
        <p><strong>Endereço:</strong> <span th:text="${lote.endereco != null ? lote.endereco.codigo : '-'}">-</span></p>
    </div>

    <hr />

    <h3>Editar Endereço</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{'/lotes/' + ${lote.id} + '/endereco'}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label for="endereco">Endereço</label>
        <select id="endereco" name="enderecoId">
            <option value="" th:text="'-- selecione --'">-- selecione --</option>
            <option th:each="e : ${enderecos}" th:value="${e.id}" th:text="${e.codigo + ' - ' + e.descricao}" th:selected="${lote.endereco != null and lote.endereco.id == e.id}"></option>
        </select>
        <div style="margin-top:10px">
            <button class="btn" type="submit">Salvar Endereço</button>
            <a class="btn" th:href="@{/lotes}">Voltar</a>
        </div>
    </form>
</div>
</body>
</html>
