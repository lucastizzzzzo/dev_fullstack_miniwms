<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Lotes</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1>Lotes</h1>
    <div class="toolbar"><a href="/lotes/novo" class="btn">Novo Lote</a></div>
    <table class="table">
      <thead><tr><th>Produto</th><th>Código Lote</th><th>Total</th><th>Reservada</th><th>Endereço</th></tr></thead>
      <tbody>
        <tr th:each="l: ${lotes}">
          <td th:text="${l.produto != null ? l.produto.nome : '-'}"></td>
          <td th:text="${l.codigoLote}"></td>
          <td th:text="${l.quantidadeTotal}"></td>
          <td th:text="${l.quantidadeReservada}"></td>
          <td th:text="${l.endereco != null ? l.endereco.codigo : '-'}"></td>
        </tr>
      </tbody>
    </table>
    <p><a href="/produtos">Voltar</a></p>
  </div>
</body>
</html>
