<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Ordens de Saída</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1>Ordens de Saída</h1>
    <div class="toolbar"><a href="/ordens/novo" class="btn">Nova Ordem</a></div>
    <table class="table">
      <thead><tr><th>Código</th><th>Produto (SKU - Descrição)</th><th>Cliente</th><th>Quantidade</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        <tr th:each="o : ${ordens}">
          <td th:text="${o.codigo}">OS-0001</td>
          <td th:text="${produtosInfo[o.id] != null ? produtosInfo[o.id] : '-'}">-</td>
          <td th:text="${clientesInfo[o.id]}">Cliente</td>
          <td th:text="${totais[o.id] != null ? totais[o.id] : 0}">0</td>
          <td th:text="${o.status}">ABERTA</td>
          <td>
            <div th:switch="${o.status}">
              <div th:case="'RESERVADA'">
                <form th:action="@{'/ordens/' + ${o.id} + '/confirmar'}" method="post" style="display:inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <button class="btn" type="submit">DESPACHAR</button>
                </form>
              </div>
              <div th:case="'DESPACHADA'">
                <button class="btn" type="button" style="background:#ccc;color:#333;border:1px solid #bbb;cursor:default" disabled>DESPACHADA</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
