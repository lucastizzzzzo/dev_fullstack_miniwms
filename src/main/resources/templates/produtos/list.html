<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Produtos - Mini WMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
  <div th:insert="fragments/header :: header"></div>
  <div class="container">
    <h1>Produtos</h1>
    <div class="toolbar">
      <a th:if="${isAdmin}" href="/produtos/novo" class="btn">Novo Produto</a>
    </div>
    <table class="table">
      <thead>
        <tr><th>SKU</th><th>Nome</th><th>Quantidade</th><th>Unidade</th><th>Ativo</th><th>Ações</th></tr>
      </thead>
      <tbody>
        <tr th:each="p : ${produtos}">
          <td><a th:href="@{'/produtos/' + ${p.id}}" th:text="${p.sku}">SKU</a></td>
          <td><a th:href="@{'/produtos/' + ${p.id}}" th:text="${p.nome}">Nome</a></td>
          <td th:text="${saldos[p.id] != null ? saldos[p.id] : 0}">0</td>
          <td th:text="${p.unidadeMedida}">UN</td>
          <td>
            <form th:action="@{'/produtos/' + ${p.id} + '/toggle'}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="checkbox" name="ativo" th:checked="${p.ativo} == true" onchange="this.form.submit()" />
            </form>
          </td>
          <td>
            <form th:if="${isAdmin}" th:action="@{'/produtos/' + ${p.id} + '/delete-permanent'}" method="post" style="display:inline; margin-left:6px" onsubmit="return confirm('Remover produto e estoque permanentemente?');">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-danger" type="submit">Remover + Estoque</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
